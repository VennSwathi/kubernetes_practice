---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fb-deploy
  labels:
    app: fb-app
    env: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fb-app
      env: prod
  template:
    metadata:
      name: fb-pod
      labels:
          app: fb-app
          env: prod
    spec:
      containers:
      - name: fb-container
        image: tomcat
        ports:
        - containerPort: 80



